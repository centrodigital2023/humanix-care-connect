# -----------------------------------------------------------------------------
# Auth · require email verification via OTP code before activating the account.
# Users get a 6-digit code in their inbox and must confirm it on /auth.
# -----------------------------------------------------------------------------
[auth]
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = true
double_confirm_changes = true
secure_password_change = true
# Keep OTP short and valid for 15 min.
otp_length = 6
otp_expiry = 900


