<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630" role="img" aria-label="Humanix Profesionales">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A192F"/>
      <stop offset="55%" stop-color="#122E54"/>
      <stop offset="100%" stop-color="#214A82"/>
    </linearGradient>
    <linearGradient id="copper" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#FFB86B"/>
      <stop offset="100%" stop-color="#FF7A4C"/>
